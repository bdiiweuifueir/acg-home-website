<!doctype html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Loading...</title>
        
        <!-- SEO & Meta Tags -->
        <meta name="description" content="这里记录着我的学习与生活~ - ACG-Home" />
        <meta name="keywords" content="二次元, 博客, 个人主页, 动漫, 游戏, ACG, 梦梦" />
        <meta name="author" content="梦梦" />
        <meta name="robots" content="index, follow" />
        
        <!-- Open Graph / Facebook / WeChat -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="我的二次元小窝" />
        <meta property="og:description" content="这里记录着我的学习与生活~" />
        <meta property="og:image" content="/assets/images/avatar.png" />
        <meta property="og:url" content="https://traehtmlafbx.vercel.app/" />
        <meta property="og:site_name" content="ACG-Home" />
        
        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="我的二次元小窝" />
        <meta name="twitter:description" content="这里记录着我的学习与生活~" />
        <meta name="twitter:image" content="/assets/images/avatar.png" />

        <!-- PWA & Icons -->
        <link rel="icon" href="/favicon.ico" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="apple-touch-icon" href="/assets/images/avatar.png" />
        <meta name="theme-color" content="#1c1c1c" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

        <link rel="stylesheet" href="/loaders/loaders.css" />
        <iframe id="global-loader-iframe" src="/loaders/global.html"></iframe>

        <!-- FontAwesome handled by Vite import -->

        <!-- 记录启动时间 -->
        <script>
            window.startTime = new Date().getTime();
            // 预定义 config 避免 Alpine 报错
            window.config = {
                content: {
                    title: "Loading...",
                    masterInfo: { name: "Loading...", socialLink: {} },
                    pageHead: { typedContent: [] },
                    theme: { colors: { autoSwitch: {}, enable: [] }, displayName: "Loading..." },
                    icp: { info: { code: {}, link: {} }, enable: [] }
                }
            };
        </script>

        <!-- CDN Scripts Removed, handled by Vite -->

        <!-- 模块化引入 index.js -->
        <script type="module" src="/src/index.js"></script>
    </head>
    <body x-data="">
        <div class="page-head">
            <span class="title"></span>
        </div>

        <div class="primary-container">
            <div class="left-area">
                <div class="cards">
                    <div class="card-item" id="personal-info">
                        <img class="avatar" :src="config.content.masterInfo.avatar || '/assets/images/avatar.png'" />
                        <span class="name" x-text="config.content.masterInfo.name">Loading...</span>
                        <div class="social-icons">Loading...</div>
                        <div style="margin-top: 10px; text-align: center; display: flex; justify-content: center; gap: 15px;">
                            <a href="#about" class="about-btn" style="font-size: 12px; color: #49b1f5; text-decoration: none;"><i class="fa-solid fa-user"></i> 关于我</a>
                            <a href="#friends" class="about-btn" style="font-size: 12px; color: #49b1f5; text-decoration: none;"><i class="fa-solid fa-link"></i> 友情链接</a>
                        </div>
                    </div>
                    <div class="card-item" id="recommend">
                        <span class="title"><i class="fa-solid fa-bullhorn"></i>公告</span>
                        <div class="content">
                            <div class="markdown-content" src="/assets/markdown/announcement.md"></div>
                        </div>
                    </div>
                    <div class="card-item" id="hitokoto">
                        <span class="title"><i class="fa-solid fa-scroll"></i>一言</span>
                        <div class="content">
                            <a id="hitokoto-text" href="" target="_blank">Loading...</a>
                        </div>
                    </div>
                    <div class="card-item" id="settings">
                        <span class="title"><i class="fa-solid fa-sliders"></i>浏览设置</span>
                        <div class="content">
                            <div class="settings-item theme-settings">
                                <span class="title"><i class="fa-solid fa-shirt"></i>配色方案 · <span x-text="config.content.theme.displayName"></span></span>
                                <div class="themes"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right-area">
                <div class="content-page">
                    <div class="markdown-content" src="./assets/markdown/content-page.md"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span class="icp-info">Loading...</span>
            <span class="line-break"><i class="fa-solid fa-ellipsis"></i></span>
            <!-- 球球你别改这里可以嘛呜呜呜 (＞﹏＜) -->
            <!-- “[Loading...]”的实际内容可以在 config.json 的 masterInfo.info 项中修改哦~ -->
            <span
                >本站由 <span class="webmaster-info"><a :href="config.content.masterInfo.website" target="_blank" x-text="config.content.masterInfo.name">[Loading...]</a> 和 </span><a href="https://hic.top" target="_blank">成成0v0</a> 用 <i class="fa-solid fa-heart"></i> 制作</span
            >

            <span>Powered by <a href="https://github.com/ChengCheng0v0/ACG-Home" target="_blank">ACG-Home</a></span>
            <span style="margin-top: 5px; opacity: 0.5; font-size: 12px;"><a href="/admin/" style="color: inherit; text-decoration: none;">Admin</a></span>
        </div>

        <iframe id="theme-color-loader-iframe" src="/loaders/theme-color.html"></iframe>

        <script>
            // 隐藏滚动条，等待加载完成
            document.body.style.overflow = "hidden";
        </script>
    </body>
</html>
